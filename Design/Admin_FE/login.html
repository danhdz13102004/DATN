<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Admin Panel</title>
  <meta name="description" content="Sign in to the RecruitPro Admin Panel" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #1a1d26;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -200px; right: -100px;
      animation: pulse 8s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
      bottom: -150px; left: -100px;
      animation: pulse 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.5; }
      to { transform: scale(1.2); opacity: 1; }
    }

    /* Grid pattern overlay */
    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Login Card */
    .login-card {
      position: relative; z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      animation: cardIn 0.5s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1d26;
      letter-spacing: -0.02em;
    }
    .brand p {
      color: #8b92a8;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 550;
      font-size: 0.88rem;
      margin-bottom: 6px;
      color: #1a1d26;
    }
    .form-group .required { color: #ef4444; }

    .input-wrapper {
      position: relative;
    }
    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8b92a8;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e2e6ed;
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: inherit;
      transition: all 0.2s ease;
      background: #fff;
      color: #1a1d26;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .input-wrapper input:focus + .input-icon,
    .input-wrapper input:focus ~ .input-icon { color: #6366f1; }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #8b92a8;
      font-size: 0.9rem;
      padding: 4px;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: #5f6780; }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 0.86rem;
    }
    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #5f6780;
      font-weight: 400;
    }
    .form-options label input {
      width: 16px; height: 16px;
      accent-color: #6366f1;
    }
    .form-options a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }
    .form-options a:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 13px 24px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    /* Security note */
    .security-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.8rem;
      color: #8b92a8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .security-note i { font-size: 0.75rem; color: #10b981; }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.78rem;
      z-index: 1;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .login-card { margin: 16px; padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
      <h1>Admin Panel</h1>
      <p>RecruitPro Administration</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="email" placeholder="admin@recruitpro.com" required id="login-email" />
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="password" placeholder="Enter your password" required id="login-password" />
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="password-toggle" onclick="togglePwd()"><i class="fas fa-eye" id="pwd-icon"></i></button>
        </div>
      </div>

      <div class="form-options">
        <label><input type="checkbox" checked /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <div class="security-note">
      <i class="fas fa-lock"></i>
      Secured with 256-bit SSL encryption
    </div>
  </div>

  <div class="footer">© 2026 RecruitPro. All rights reserved.</div>

  <script>
    function togglePwd() {
      const input = document.getElementById('login-password');
      const icon = document.getElementById('pwd-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
