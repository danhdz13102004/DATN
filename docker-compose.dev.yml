# RecruitPro — Development Overrides (Hot Reload)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up --build

volumes:
  backend_target:
  maven_repo:
  frontend_js_node_modules:
  frontend_co_node_modules:
  frontend_ad_node_modules:

services:

  # ── Backend (Hot Reload) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: /app/entrypoint-dev.sh
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: ${SPRING_DEVTOOLS_RESTART_ENABLED}
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: ${SPRING_DEVTOOLS_LIVERELOAD_ENABLED}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - backend_target:/app/target
      - maven_repo:/root/.m2
    ports:
      - "8080:8080"

  # ── AI Service (Hot Reload) ──────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/tests:/app/tests
      - ./ai-service/models:/app/models

  # ── Database (Dev Port) ──────────────────────
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ── Elasticsearch (Dev Port) ─────────────────
  elasticsearch:
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"

  # ── MinIO (Dev Ports) ────────────────────────
  minio:
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # ── Frontend — Job Seeker (Hot Reload) ───────
  frontend-jobseeker:
    build:
      context: ./frontend-jobseeker
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: "http://127.0.0.1:8080"
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend-jobseeker/src:/app/src
      - ./frontend-jobseeker/public:/app/public
      - ./frontend-jobseeker/index.html:/app/index.html
      - ./frontend-jobseeker/vite.config.ts:/app/vite.config.ts
      - ./frontend-jobseeker/tsconfig.json:/app/tsconfig.json
      - ./frontend-jobseeker/tailwind.config.js:/app/tailwind.config.js
      - ./frontend-jobseeker/postcss.config.js:/app/postcss.config.js
      - frontend_js_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_JOBSEEKER_PORT:-3000}:3000"

  # ── Frontend — Company (Hot Reload) ──────────
  frontend-company:
    build:
      context: ./frontend-company
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: "http://127.0.0.1:8080"
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend-company/src:/app/src
      - ./frontend-company/public:/app/public
      - ./frontend-company/index.html:/app/index.html
      - ./frontend-company/vite.config.ts:/app/vite.config.ts
      - ./frontend-company/tsconfig.json:/app/tsconfig.json
      - ./frontend-company/tailwind.config.js:/app/tailwind.config.js
      - ./frontend-company/postcss.config.js:/app/postcss.config.js
      - frontend_co_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_COMPANY_PORT:-3001}:3000"

  # ── Frontend — Admin (Hot Reload) ───────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: "http://127.0.0.1:8080"
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend-admin/src:/app/src
      - ./frontend-admin/public:/app/public
      - ./frontend-admin/index.html:/app/index.html
      - ./frontend-admin/vite.config.ts:/app/vite.config.ts
      - ./frontend-admin/tsconfig.json:/app/tsconfig.json
      - ./frontend-admin/tailwind.config.js:/app/tailwind.config.js
      - ./frontend-admin/postcss.config.js:/app/postcss.config.js
      - frontend_ad_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_ADMIN_PORT:-3002}:3000"
