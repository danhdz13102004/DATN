server:
  port: 8080

spring:
  application:
    name: recruitpro-backend

  # ── Database ───────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recruitpro}
    username: ${SPRING_DATASOURCE_USERNAME:recruitpro}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Pagination ─────────────────────────────
  data:
    web:
      pageable:
        one-indexed-parameters: true

    # ── Redis ──────────────────────────────────
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # ── Mail ───────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── JWT ────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-do-not-use-in-production}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002}
  ai-service:
    url: ${AI_SERVICE_URL:http://127.0.0.1:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-url: ${MINIO_PUBLIC_URL:http://127.0.0.1:9000}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_DEFAULT_BUCKET:recruitpro}
    use-ssl: ${MINIO_USE_SSL:false}
  seed:
    enabled: ${SEED_ENABLED:false}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_51T8KMCGk0gzcyWKKPHrQbsWLahqGqjHLjkkPQgDmsOgl7mwTeMJUgRG9ol9k5eCzaGApPeEkOGGE0Eq8CL47KM9100go2ziwCN}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    connect-timeout-ms: ${OPENAI_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${OPENAI_READ_TIMEOUT_MS:60000}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_0b4d97785df70e4fb970b0a30fbb6601f3ddb1ee865ddbe75a97666786ccc722}
    currency: ${STRIPE_CURRENCY:usd}

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────
logging:
  level:
    com.recruitpro: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
