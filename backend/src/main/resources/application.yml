server:
  port: 8080

spring:
  application:
    name: recruitpro-backend

  # ── Database ───────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recruitpro}
    username: ${SPRING_DATASOURCE_USERNAME:recruitpro}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Redis ──────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # ── Mail ───────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── JWT ────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-do-not-use-in-production}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_DEFAULT_BUCKET:recruitpro}
    use-ssl: ${MINIO_USE_SSL:false}
  seed:
    enabled: ${SEED_ENABLED:false}

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────
logging:
  level:
    com.recruitpro: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
