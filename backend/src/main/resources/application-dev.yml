# Development profile overrides
spring:
  jpa:
    show-sql: true
  devtools:
    restart:
      enabled: true
      poll-interval: 2000
      quiet-period: 1000
    livereload:
      enabled: true

app:
  seed:
    enabled: ${SEED_ENABLED:true}

# ── Actuator (dev) ─────────────────────────────
management:
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

logging:
  level:
    com.recruitpro: DEBUG
    org.hibernate.SQL: DEBUG
