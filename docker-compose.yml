# RecruitPro — Base Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ai_models:

services:

  # ── PostgreSQL + pgvector ────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: recruitpro-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: recruitpro-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ────────────
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: recruitpro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init (create default bucket) ───────
  minio-init:
    image: minio/mc:RELEASE.2024-01-18T07-03-39Z
    container_name: recruitpro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_DEFAULT_BUCKET} --ignore-existing;
      mc anonymous set download local/$${MINIO_DEFAULT_BUCKET};
      echo 'Bucket created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
    networks:
      - app-network

  # ── Backend (Spring Boot) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitpro-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${BACKEND_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${BACKEND_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BACKEND_DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      SEED_ENABLED: ${SEED_ENABLED}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── AI Service (FastAPI) ─────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: recruitpro-ai-service
    environment:
      AI_SERVICE_MODEL_PATH: ${AI_SERVICE_MODEL_PATH}
      AI_SERVICE_MODEL_VERSION: ${AI_SERVICE_MODEL_VERSION}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    volumes:
      - ai_models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend — Job Seeker ────────────────────
  frontend-jobseeker:
    build:
      context: ./frontend-jobseeker
      dockerfile: Dockerfile
    container_name: recruitpro-frontend-jobseeker
    ports:
      - "${FRONTEND_JOBSEEKER_PORT:-3000}:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend — Company ──────────────────────
  frontend-company:
    build:
      context: ./frontend-company
      dockerfile: Dockerfile
    container_name: recruitpro-frontend-company
    ports:
      - "${FRONTEND_COMPANY_PORT:-3001}:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend — Admin ────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: recruitpro-frontend-admin
    ports:
      - "${FRONTEND_ADMIN_PORT:-3002}:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
