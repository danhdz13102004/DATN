# RecruitPro — Base Docker Compose
# Usage:
#   Development:  docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up --build
#   Production:    docker compose --env-file .env.localprod -f docker-compose.yml -f docker-compose.prod.yml up --build
#   AWS Production: docker compose --env-file .env.aws -f docker-compose.yml -f docker-compose.prod.yml up -d --build

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ai_models:

services:

  # ── PostgreSQL + pgvector ────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: recruitpro-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: recruitpro-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ────────────
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: recruitpro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init (create default bucket) ───────
  minio-init:
    image: minio/mc:RELEASE.2024-01-18T07-03-39Z
    container_name: recruitpro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_DEFAULT_BUCKET} --ignore-existing;
      mc anonymous set download local/$${MINIO_DEFAULT_BUCKET};
      echo 'Bucket created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
    networks:
      - app-network

  # ── Backend (Spring Boot) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitpro-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${BACKEND_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${BACKEND_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BACKEND_DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      SEED_ENABLED: ${SEED_ENABLED}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── AI Service (FastAPI) ─────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: recruitpro-ai-service
    environment:
      AI_SERVICE_MODEL_PATH: ${AI_SERVICE_MODEL_PATH}
      AI_SERVICE_MODEL_VERSION: ${AI_SERVICE_MODEL_VERSION}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      TRANSFORMERS_CACHE: /home/appuser/.cache/huggingface
      HF_HOME: /home/appuser/.cache/huggingface
    volumes:
      - ai_models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend — Job Seeker ────────────────────
  # Only started in development (profile: dev).
  # In production, served by the central nginx service.
  frontend-jobseeker:
    build:
      context: ./frontend-jobseeker
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: recruitpro-frontend-jobseeker
    profiles:
      - dev
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend — Company ───────────────────────
  # Only started in development (profile: dev).
  # In production, served by the central nginx service.
  frontend-company:
    build:
      context: ./frontend-company
      dockerfile: Dockerfile
    container_name: recruitpro-frontend-company
    profiles:
      - dev
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend — Admin ───────────────────────
  # Only started in development (profile: dev).
  # In production, served by the central nginx service.
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: recruitpro-frontend-admin
    profiles:
      - dev
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
